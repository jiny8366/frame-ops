[server]
headless = true
port = 8501
# XSRF 쿠키 사용 시 CORS=false와 호환되지 않음 → 기본(CORS 허용) 사용
enableXsrfProtection = true
# 코드 저장 후 자동 재실행 (멀티페이지 앱에서 수정이 안 보일 때 필수에 가깝게 도움)
runOnSave = true
# macOS + iCloud/네트워크 드롭박스 등에서 inotify/watchdog이 이벤트를 놓치는 경우가 있어 poll 권장
fileWatcherType = "poll"

[browser]
gatherUsageStats = false

[theme]
base = "dark"
backgroundColor = "#121214"
secondaryBackgroundColor = "#1a1a1c"
textColor = "#f5f5f7"
font = "sans serif"
